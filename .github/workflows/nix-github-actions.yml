name: Nix Flake actions
on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
jobs:
  wine-astral:
    name: "Build wine-astral"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#wine-astral
  wineprefix-preparer:
    name: "Build wineprefix-preparer"
    runs-on: ubuntu-latest
    needs: wine-astral
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#wineprefix-preparer
  wineprefix-preparer-git:
    name: "Build wineprefix-preparer-git"
    runs-on: ubuntu-latest
    needs: wine-astral
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#wineprefix-preparer-git
  rsi-launcher:
    name: "Build rsi-launcher"
    runs-on: ubuntu-latest
    needs: wineprefix-preparer
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#rsi-launcher .#rsi-launcher-unwrapped
  rsi-launcher-git:
    name: "Build rsi-launcher-git"
    runs-on: ubuntu-latest
    needs: wineprefix-preparer-git
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#rsi-launcher-git .#rsi-launcher-unwrapped-git
  gameglass:
    name: "Build gameglass"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: NIXPKGS_ALLOW_INSECURE=1  nix build -L .#gameglass --accept-flake-config --impure
  wine-astral-x86-64-v3:
    name: "Build optimized wine-astral-x86-64-v3"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#packages.x86_64-linux-v3.wine-astral
  wineprefix-preparer-x86-64-v3:
    name: "Build optimized wineprefix-preparer"
    runs-on: ubuntu-latest
    needs:
      - wine-astral-x86-64-v3
      - wineprefix-preparer
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#packages.x86_64-linux-v3.wineprefix-preparer
  wineprefix-preparer-git-x86-64-v3:
    name: "Build optimized wineprefix-preparer-git"
    runs-on: ubuntu-latest
    needs:
      - wine-astral-x86-64-v3
      - wineprefix-preparer-git
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#packages.x86_64-linux-v3.wineprefix-preparer-git
  rsi-launcher-x86-64-v3:
    name: "Build optimized rsi-launcher"
    runs-on: ubuntu-latest
    needs:
      - wineprefix-preparer-x86-64-v3
      - rsi-launcher
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#packages.x86_64-linux-v3.rsi-launcher .#packages.x86_64-linux-v3.rsi-launcher-unwrapped
  rsi-launcher-git-x86-64-v3:
    name: "Build optimized rsi-launcher-git"
    runs-on: ubuntu-latest
    needs:
      - wineprefix-preparer-git-x86-64-v3
      - rsi-launcher-git
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#packages.x86_64-linux-v3.rsi-launcher-git .#packages.x86_64-linux-v3.rsi-launcher-unwrapped-git
  lug-helper:
    name: "Build lug-helper"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#lug-helper
  dw-proton-bin:
    name: "Build dw-proton-bin"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#dw-proton-bin
  proton-ge-bin:
    name: "Build proton-ge-bin"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#proton-ge-bin
  proton-em-bin:
    name: "Build proton-em-bin"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: nix-citizen
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-gaming
      - run: nix build -L .#proton-em-bin
